  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #121213; }
    body { font-family: 'Montserrat', sans-serif; color: #fff; }
    #wordle-root { min-height: 100vh; }

    @keyframes flip {
      0%   { transform: rotateX(0); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      10%,30%,50%,70%,90% { transform: translateX(-4px); }
      20%,40%,60%,80%     { transform: translateX(4px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .row-shake { animation: shake 0.5s ease; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1b; }
    ::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 3px; }

const COLORS = {
  correct:"#538d4e", present:"#b59f3b", absent:"#3a3a3c",
  empty:"#121213", border:"#3a3a3c", borderFilled:"#565758", key:"#818384"
};

function getTileColor(guess, answer, pos) {
  const letter = guess[pos];
  if (answer[pos] === letter) return "correct";
  if (!answer.includes(letter)) return "absent";
  const ans = answer.split(""), g = guess.split("");
  let correct = 0;
  for (let i=0;i<5;i++) if(g[i]===letter&&ans[i]===letter) correct++;
  const total = ans.filter(l=>l===letter).length;
  let prior = 0;
  for (let i=0;i<pos;i++) if(g[i]===letter&&ans[i]!==letter) prior++;
  return (correct+prior < total) ? "present" : "absent";
}

function computeLetterStates(guesses, answer) {
  const states={}, p={correct:3,present:2,absent:1,"":0};
  for (const guess of guesses)
    for (let i=0;i<5;i++) {
      const l=guess[i], c=getTileColor(guess,answer,i);
      if((p[c]||0)>(p[states[l]]||0)) states[l]=c;
    }
  return states;
}

function filterWords(list, guesses, answer) {
  if (guesses.length === 0) return list;
  return list.filter(word => {
    for (const guess of guesses) {
      for (let i=0;i<5;i++) {
        const l=guess[i], c=getTileColor(guess,answer,i);
        if(c==="correct"&&word[i]!==l) return false;
        if(c==="absent") {
          let cc=0,pc=0;
          for(let j=0;j<5;j++){const x=getTileColor(guess,answer,j);if(guess[j]===l&&x==="correct")cc++;if(guess[j]===l&&x==="present")pc++;}
          if(word.split("").filter(x=>x===l).length>cc+pc) return false;
        }
        if(c==="present"){if(word[i]===l)return false;if(!word.includes(l))return false;}
      }
    }
    return true;
  });
}

const state = {
  answer:"", guesses:[], current:"",
  gameOver:false, showNewGame:false, usedWords:new Set(),
  mode:"solitaire", myWord:""
};
function initGame() {
  if (state.mode==="myword") {
    state.answer = state.myWord;
  } else {
    const unused = ANSWERS.filter(w => !state.usedWords.has(w));
    const pool = unused.length > 0 ? unused : ANSWERS;
    state.answer = pool[Math.floor(Math.random()*pool.length)];
    state.usedWords.add(state.answer);
  }
  state.guesses=[]; state.current="";
  state.gameOver=false; state.showNewGame=false;
}
initGame();

const finder = { open:false, letters:"", results:[] };
const modeSelector = { open:false };
const myWordEntry = { open:false, letters:"" };

const { useState, useEffect, useCallback } = React;

function App() {
  const [,forceRender] = useState(0);
  const rerender = useCallback(()=>forceRender(n=>n+1),[]);
  const [shaking, setShaking] = useState(false);
  const [finderShaking, setFinderShaking] = useState(false);
  const [message, setMessage] = useState("");
  const [flipping, setFlipping] = useState({});

  const showMsg = useCallback((msg,dur=2000)=>{
    setMessage(msg); setTimeout(()=>setMessage(""),dur);
  },[]);

  const processGameKey = useCallback((key)=>{
    if (state.gameOver) {
      if (key==="Enter"&&state.showNewGame){ initGame(); setFlipping({}); rerender(); }
      return;
    }
    if (key==="Enter") {
      if (state.current.length!==5){
        setShaking(true); setTimeout(()=>setShaking(false),500);
        showMsg("Not enough letters"); return;
      }
      if (!ANSWERS.includes(state.current)){
        setShaking(true); setTimeout(()=>setShaking(false),500);
        showMsg("Not in word list"); return;
      }
      const rowIdx=state.guesses.length, word=state.current;
      state.guesses=[...state.guesses,word]; state.current="";
      setFlipping(f=>({...f,[rowIdx+"_"+word]:true}));
      rerender();
      const isWin=word===state.answer, isLast=state.guesses.length>=6;
      if (isWin||isLast) {
        state.gameOver=true;
        const msgs=["Genius!","Magnificent!","Impressive!","Splendid!","Great!","Phew!"];
        setTimeout(()=>{
          state.showNewGame=true;
          showMsg(isWin?(msgs[state.guesses.length-1]||"Nice!"):state.answer.toUpperCase(),isWin?3000:5000);
          rerender();
        },1800);
      }
      return;
    }
    if (key==="Backspace"){ state.current=state.current.slice(0,-1); rerender(); return; }
    if (/^[a-z]$/.test(key)&&state.current.length<5){ state.current+=key; rerender(); }
  },[rerender,showMsg]);

  const processFinderKey = useCallback((key)=>{
    if (key==="Enter") {
      if (finder.letters.length<3){ setFinderShaking(true); setTimeout(()=>setFinderShaking(false),500); return; }
      const letters=finder.letters.toLowerCase().split("");
      finder.results=ANSWERS.filter(w=>letters.every(l=>w.includes(l))).sort();
      rerender(); return;
    }
    if (key==="Backspace"){ finder.letters=finder.letters.slice(0,-1); rerender(); return; }
    if (/^[a-z]$/.test(key)&&finder.letters.length<4){ finder.letters+=key; rerender(); }
  },[rerender]);

  useEffect(()=>{
    function onKeyDown(e){
      if(e.ctrlKey||e.altKey||e.metaKey) return;
      if(e.target&&(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")) return;
      const key=e.key==="Backspace"?"Backspace":e.key==="Enter"?"Enter":e.key==="Escape"?"Escape":/^[a-zA-Z]$/.test(e.key)?e.key.toLowerCase():null;
      if(!key) return;
      e.preventDefault();
      if(key==="Escape"&&finder.open){ finder.open=false; finder.letters=""; finder.results=[]; rerender(); return; }
      if(finder.open) processFinderKey(key);
      else processGameKey(key);
    }
    document.addEventListener("keydown",onKeyDown);
    return()=>document.removeEventListener("keydown",onKeyDown);
  },[processGameKey,processFinderKey,rerender]);

  const openFinder=useCallback(()=>{ finder.open=true; finder.letters=""; finder.results=[]; rerender(); },[rerender]);
  const closeFinder=useCallback(()=>{ finder.open=false; finder.letters=""; finder.results=[]; rerender(); },[rerender]);
  const handleGameBtn=useCallback((key)=>processGameKey(key==="⌫"?"Backspace":key),[processGameKey]);
  const handleFinderBtn=useCallback((key)=>processFinderKey(key==="⌫"?"Backspace":key),[processFinderKey]);

  // Mode selector
  const openModeSelector=useCallback(()=>{ modeSelector.open=true; rerender(); },[rerender]);
  const closeModeSelector=useCallback(()=>{ modeSelector.open=false; rerender(); },[rerender]);

  // My Word entry
  const openMyWordEntry=useCallback(()=>{ myWordEntry.open=true; myWordEntry.letters=state.myWord||""; rerender(); },[rerender]);
  const closeMyWordEntry=useCallback(()=>{ myWordEntry.open=false; rerender(); },[rerender]);

  const processMyWordKey=useCallback((key)=>{
    if (key==="Enter") {
      if (myWordEntry.letters.length!==5) return;
      state.myWord=myWordEntry.letters.toLowerCase();
      state.mode="myword";

      modeSelector.open=false;
      initGame(); setFlipping({}); rerender(); return;
    }
    if (key==="Backspace"){ myWordEntry.letters=myWordEntry.letters.slice(0,-1); rerender(); return; }
    if (/^[a-zA-Z]$/i.test(key)&&myWordEntry.letters.length<5){ myWordEntry.letters+=key.toLowerCase(); rerender(); }
  },[rerender]);
  const handleMyWordBtn=useCallback((key)=>processMyWordKey(key==="⌫"?"Backspace":key),[processMyWordKey]);

  const { answer, guesses, current, gameOver, showNewGame } = state;

    React.createElement("div",{style:S.header},
      React.createElement("span",{style:{fontSize:22,fontWeight:800,letterSpacing:4,flex:1,textAlign:"center"}},state.mode==="myword"?"WORDLE MY WORD":"WORDLE SOLITAIRE"),

          React.createElement("span",{style:{fontWeight:800,fontSize:16,letterSpacing:2,textTransform:"uppercase"}},"Choose Mode"),
          React.createElement("button",{
            onMouseDown:(e)=>{e.preventDefault();closeModeSelector();},
            onTouchEnd:(e)=>{e.preventDefault();closeModeSelector();},

        React.createElement("button",{

        React.createElement("button",{
          onMouseDown:(e)=>{e.preventDefault();closeModeSelector();openMyWordEntry();},

    myWordEntry.open&&React.createElement("div",{

    },
      React.createElement("div",{style:S.modal},
        React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
          React.createElement("span",{style:{fontWeight:800,fontSize:16,letterSpacing:2,textTransform:"uppercase"}},"My Word"),
          React.createElement("button",{
            onMouseDown:(e)=>{e.preventDefault();closeMyWordEntry();},
            onTouchEnd:(e)=>{e.preventDefault();closeMyWordEntry();},
            style:{...btnBase,background:"#3a3a3c",color:"#fff",borderRadius:4,width:32,height:32,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}
          },"×")
        ),
        React.createElement("div",{style:{fontSize:12,color:"#818384",marginBottom:14,letterSpacing:0.5}},
          "Enter any 5 characters — this becomes the secret word."
        ),
        React.createElement("div",{style:{display:"flex",gap:8,justifyContent:"center",marginBottom:16}},
          ...Array.from({length:5}).map((_,i)=>{
            const letter=myWordEntry.letters[i]||"";
            const isActive=i===myWordEntry.letters.length&&myWordEntry.letters.length<5;
            return React.createElement("div",{key:i,style:{width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${letter?"#b59f3b":isActive?"#818384":"#3a3a3c"}`,borderRadius:4,fontSize:24,fontWeight:800,textTransform:"uppercase",color:"#fff",background:"#121213",boxShadow:isActive?"0 0 0 1px #818384":"none",transition:"border-color 0.15s"}},letter.toUpperCase());
          })
        ),
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6,alignItems:"center",marginBottom:16}},
          ...KEYBOARD_ROWS.map((row,ri)=>
            React.createElement("div",{key:ri,style:{display:"flex",gap:5}},
              ...row.map(key=>{
                const wide=isWide(key);
                const bg=key==="Enter"?"#b59f3b":key==="⌫"?"#3a3a3c":"#818384";
                return React.createElement("button",{
                  key,
                  onMouseDown:(e)=>{e.preventDefault();handleMyWordBtn(key);},
                  onTouchEnd:(e)=>{e.preventDefault();handleMyWordBtn(key);},
                  style:{...btnBase,height:44,width:wide?54:34,borderRadius:4,backgroundColor:bg,color:"#fff",fontSize:wide?10:13,textTransform:"uppercase",display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}
                },key);
              })
            )
          )
        ),
        myWordEntry.letters.length===5&&React.createElement("div",{style:{textAlign:"center",color:"#818384",fontSize:12,fontStyle:"italic"}},"Press Enter to start playing")
      )
    ),

    // Finder overlay
    finder.open&&React.createElement("div",{
      style:S.overlay,
      onMouseDown:(e)=>{if(e.target===e.currentTarget)closeFinder();},
      onTouchEnd:(e)=>{if(e.target===e.currentTarget){e.preventDefault();closeFinder();}}
    },
      React.createElement("div",{style:S.modal},
        React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
          React.createElement("span",{style:{fontWeight:800,fontSize:16,letterSpacing:2,textTransform:"uppercase"}},"Find a Word"),
          React.createElement("button",{
            onMouseDown:(e)=>{e.preventDefault();closeFinder();},
            onTouchEnd:(e)=>{e.preventDefault();closeFinder();},
            style:{...btnBase,background:"#3a3a3c",color:"#fff",borderRadius:4,width:32,height:32,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}
          },"×")
        ),
        React.createElement("div",{style:{fontSize:12,color:"#818384",marginBottom:14,letterSpacing:0.5}},
          "Enter 3 or 4 letters — words containing ALL of them will appear."
        ),
        // Letter tiles
        React.createElement("div",{
          className:finderShaking?"row-shake":"",
          style:{display:"flex",gap:8,justifyContent:"center",marginBottom:16}
        },
          ...Array.from({length:4}).map((_,i)=>{
            const letter=finder.letters[i]||"";
            const isActive=i===finder.letters.length&&finder.letters.length<4;
            return React.createElement("div",{key:i,style:{width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${letter?"#565758":isActive?"#818384":"#3a3a3c"}`,borderRadius:4,fontSize:24,fontWeight:800,textTransform:"uppercase",color:"#fff",background:"#121213",boxShadow:isActive?"0 0 0 1px #818384":"none",transition:"border-color 0.15s"}},letter.toUpperCase());
          })
        ),
        // Finder keyboard
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6,alignItems:"center",marginBottom:16}},
          ...KEYBOARD_ROWS.map((row,ri)=>
            React.createElement("div",{key:ri,style:{display:"flex",gap:5}},
              ...row.map(key=>{
                const wide=isWide(key);
                const bg=key==="Enter"?"#538d4e":key==="⌫"?"#3a3a3c":"#818384";
                return React.createElement("button",{
                  key,
                  onMouseDown:(e)=>{e.preventDefault();handleFinderBtn(key);},
                  onTouchEnd:(e)=>{e.preventDefault();handleFinderBtn(key);},
                  style:{...btnBase,height:44,width:wide?54:34,borderRadius:4,backgroundColor:bg,color:"#fff",fontSize:wide?10:13,textTransform:"uppercase",display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}
                },key);
              })
            )
          )
        ),
        // Results
        finder.results.length>0&&React.createElement(React.Fragment,null,
          React.createElement("div",{style:{fontSize:12,color:"#818384",letterSpacing:1,textTransform:"uppercase",marginBottom:8}},
            finder.results.length," word",finder.results.length!==1?"s":""," found"
          ),
          React.createElement("div",{style:{overflowY:"auto",flex:1,display:"flex",flexWrap:"wrap",gap:"4px 8px",alignContent:"flex-start"}},
            ...finder.results.map(word=>{
              const chars=word.split("");
              const rem=[...searchLetters];
              const positions=chars.map(ch=>{const idx=rem.indexOf(ch);if(idx!==-1){rem.splice(idx,1);return true;}return false;});
              return React.createElement("span",{key:word,style:{fontFamily:"'Courier New',monospace",fontSize:14,padding:"3px 7px",background:"#2a2a2b",borderRadius:4,letterSpacing:1,display:"inline-flex"}},
                ...chars.map((ch,i)=>React.createElement("span",{key:i,style:{color:positions[i]?"#b59f3b":"#e0e0e0",fontWeight:positions[i]?700:400}},ch.toUpperCase()))
              );
            })
          )
        ),
        finder.results.length===0&&finder.letters.length>=3&&React.createElement("div",{style:{color:"#818384",fontSize:13,fontStyle:"italic",textAlign:"center",marginTop:8}},"No words found — try different letters.")
      )
    ),

    // Main layout
    React.createElement("div",{style:S.layout},

      // Grid
      React.createElement("div",{style:{display:"grid",gridTemplateRows:"repeat(6,1fr)",gap:6,marginBottom:12}},
          ...Array.from({length:6}).map((_,rowIdx)=>{
            const guess=guesses[rowIdx], isCurrent=rowIdx===guesses.length;
            return React.createElement("div",{key:rowIdx,className:isCurrent&&shaking?"row-shake":"",style:{display:"flex",gap:6}},
              ...Array.from({length:5}).map((_,colIdx)=>{
                const isRevealed=guess!==undefined;
                const letter=isRevealed?guess[colIdx]:(isCurrent?current[colIdx]||"":"");
                const bg=isRevealed?COLORS[getTileColor(guess,answer,colIdx)]:COLORS.empty;
                const border=isRevealed?bg:(letter?COLORS.borderFilled:COLORS.border);
                const delay=isRevealed?colIdx*0.3:0;
                const flipKey=rowIdx+"_"+(guess||"");
                const anim=isRevealed&&flipping[flipKey]?`flip 0.5s ease ${delay}s forwards`:"none";
                return React.createElement("div",{key:colIdx,style:{width:52,height:52,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${border}`,backgroundColor:bg,color:"#fff",fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:20,textTransform:"uppercase",borderRadius:4,transition:`background-color 0.1s ${delay}s,border-color 0.1s ${delay}s`,animation:anim,userSelect:"none"}},letter.toUpperCase());
              })
            );
          })
        ),

      // Possible words panel — between grid and keyboard
      React.createElement("div",{style:S.panel},
        React.createElement("div",{style:{fontWeight:700,fontSize:12,letterSpacing:2,color:"#818384",marginBottom:6,textTransform:"uppercase",flexShrink:0,display:"flex",alignItems:"center"}},
          "Possible Words",

          ?React.createElement("div",{style:{color:"#565758",fontSize:12,fontStyle:"italic"}},"Make your first guess to see remaining possibilities...")
